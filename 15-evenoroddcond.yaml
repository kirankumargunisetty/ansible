- name: even or odd
  hosts: localhost
  connection: local
  vars:
    given_number: 8
  tasks:
  - when: given_number % 2 == 0 
    debug:
      msg: "given number: {{ given_number }} is even"
    name: is even
    
  - name: is odd
    debug:
      msg: "given number: {{ given_number }} is odd"
    when: given_number % 2 != 0  