- name: course information
  hosts: local
  connection: local
  vars:
    course: "Devops with AIOps" #string
    duration_in_hrs: 150 #int/number
    is_live_sessions: true #boolean
    topics: # list
    - linux
    - shell
    - ansible
    more_details: #map
      months: "5"
      trainer: "Kiran"
    tasks:
    - name: print information
      msg: 
        name: {{ course }}
        duration: {{ duration_in_hrs }}
        is_it_live: {{ is_live_sessions }}
        topics: {{ topics }}
        more_details: {{ more_details }}

